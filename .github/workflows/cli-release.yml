name: cli-release

on:
  workflow_dispatch:
  push:
    tags:
      - "capmind-v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp target/release/cap release/capmind-${{ runner.os }}

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item target/release/cap.exe release/capmind-${{ runner.os }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capmind-${{ runner.os }}
          path: release/*

  publish:
    if: startsWith(github.ref, 'refs/tags/capmind-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: capmind-*
          merge-multiple: true
          path: release

      - name: Generate SHA256SUMS
        run: |
          cd release
          ls -1 capmind-* | sort | xargs sha256sum > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
          generate_release_notes: true
