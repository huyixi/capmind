name: cli-auto-release

on:
  push:
    branches:
      - main
    paths:
      - "apps/cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/cli-auto-release.yml"
      - ".github/workflows/cli-homebrew-tap-sync.yml"
      - ".github/release-please-config.json"
      - ".release-please-manifest.json"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cli-auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['apps/cli--release_created'] }}
      tag_name: ${{ steps.release.outputs['apps/cli--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    if: needs.release-please.outputs.release_created == 'true'
    needs: release-please
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp target/release/cap release/capmind-${{ runner.os }}

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item target/release/cap.exe release/capmind-${{ runner.os }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capmind-${{ runner.os }}
          path: release/*

  publish:
    if: needs.release-please.outputs.release_created == 'true'
    needs: [release-please, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: capmind-*
          merge-multiple: true
          path: release

      - name: Generate SHA256SUMS
        run: |
          cd release
          ls -1 capmind-* | sort | xargs sha256sum > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: release/**/*
          fail_on_unmatched_files: true

  sync-homebrew-tap:
    if: needs.release-please.outputs.release_created == 'true'
    needs: [release-please, publish]
    uses: ./.github/workflows/cli-homebrew-tap-sync.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
      tap_repo: ${{ vars.HOMEBREW_TAP_REPO }}
      formula_path: ${{ vars.HOMEBREW_FORMULA_PATH }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
